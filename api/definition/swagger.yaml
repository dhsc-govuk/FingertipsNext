openapi: 3.0.0
servers:
  # Added by API Auto Mocking Plugin
  - description: SwaggerHub API Auto Mocking
    url: https://fingertips-next-api/1.0.0
info:
  description: An API to query public health indicator data.
  version: "1.0.0"
  title: Fingertips API
  contact:
    email: ProfileFeedback@dhsc.gov.uk
tags:
  - name: indicators
    description: Endpoints dealing with public health indicators
paths:
  /indicators:
    get:
      tags:
        - indicators
      summary: Get indicator summaries & filter results
      operationId: filterIndicators
      description: |
        Get summaries of public health indicators, by passing in the appropriate options you can filter the results
      parameters:
        - $ref: "#/components/parameters/indicator_ids"
      responses:
        "200":
          description: search results matching criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IndicatorSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerErrror"
  /indicators/{indicator_id}:
    get:
      tags:
        - indicators
      summary: Get indicator
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indicator"
          description:
            The request was successful, and the server has returned the
            requested resource in the response body.
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerErrror"
      parameters:
        - $ref: "#/components/parameters/indicator_id"
      description: >
        Fetches details of a specific indicator by its unique identifier. The
        response includes the indicator's metadata
      operationId: getIndicator
  /indicators/{indicator_id}/data:
    get:
      tags:
        - indicators
      summary: Get health data for an indicator
      description:
        Get data for a public health indicator. This will return all data for all areas and all years for the indicators. Optionally filter the results by supplying one
        or more area codes and one or more years in the query string.
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthDataForArea"
                title: GetHealthDataForAnIndicatorOk
          description:
            Data containing the health data points for the indicator, years
            and geographical areas requested
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerErrror"
      parameters:
        - $ref: "#/components/parameters/indicator_id"
        - $ref: "#/components/parameters/area_codes"
        - $ref: "#/components/parameters/years"
      operationId: getHealthDataForAnIndicator

  /areas/population/data:
    get:
      tags:
        - areas
        - population
      summary: Get population data for up to 10 area codes
      description: Get population data for requested areas
      parameters:
        - $ref: "#/components/parameters/area_codes"
        - $ref: "#/components/parameters/years"
      responses:
        "200":
          description: |
            The request was successful, and the server has returned the
            requested population data in the response body.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PopulationDataForArea_ASIS"
                title: GetPopulationDataForAnAreaOk
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerErrror"

components:
  schemas:
    IndicatorSummary:
      type: object
      description: A summary of a public health indicator
      required:
        - indicator_id
        - title
      properties:
        indicator_id:
          type: integer
          format: int32
          example: 3456
          description: The unique identifier of the indicator
        title:
          type: string
          example: "Hypertension: QOF prevalence (all ages)"
          description: The title of the indicator
    Indicator:
      type: object
      description: A public health indicator
      required:
        - indicator_id
        - title
        - definition
      properties:
        indicator_id:
          type: integer
          format: int32
          example: 3456
          description: The unique identifier of the indicator
        title:
          type: string
          example: "Hypertension: QOF prevalence (all ages)"
          description: The title of the indicator
        definition:
          type: string
          example: "The percentage of patients with established hypertension, as
            recorded on practice disease registers (proportion of total list
            size)"
          description: The definition of the indicator
    HealthDataPoint:
      type: object
      description:
        Represents a health data point for a public health indicator with a
        count, value, upper confidence interval, lower confidence interval and a
        year.
      required:
        - year
        - count
        - value
        - lowerCi
        - upperCi
      properties:
        year:
          type: integer
          format: int32
          example: 2023
          description: The year that the data point is for
        count:
          type: number
          example: 222
          description: The count
        value:
          type: number
          example: 506.60912
          description: The value
        lowerCi:
          type: number
          example: 441.69151
          description: The lower confidence interval
        upperCi:
          type: number
          format: float
          example: 578.32766
          description: The upper confidence interval
    HealthDataForArea:
      type: object
      description: Associates a list of health data points with the relevant
        geographical area (represented by it's unique code).
      required:
        - areaCode
        - healthData
      properties:
        areaCode:
          type: string
          example: A1426
          description: The unique area code that the health data are for
        healthData:
          type: array
          items:
            $ref: "#/components/schemas/HealthDataPoint"
          description: The health data points for the area and indicator
    PopulationDataPoint:
      type: object
      description: |
        Represents a population data point with age band, total female, total male, percentage value female and percentage value male.
        percentage value.
      required:
        - age_band
        - total_female
        - total_male
        - percent_female
        - percent_male
      properties:
        age_band:
          type: string
          example: "0-4"
          enum:
            - "0-4"
            - "5-9"
            - "10-14"
            - "15-19"
            - "20-24"
            - "25-29"
            - "30-34"
            - "35-39"
            - "40-44"
            - "45-49"
            - "50-54"
            - "55-59"
            - "60-64"
            - "65-69"
            - "70-74"
            - "75-79"
            - "80-84"
            - "85-89"
            - "90+"
        total_female:
          type: integer
          example: 1568625
          description: total female population given age band
        total_male:
          type: integer
          example: 1496012
          description: total male population given age band
        value_female:
          type: number
          example: 2.72
          description: percentage value female population given age band
        value_male:
          type: number
          example: 2.59
          description: percentage value male population given age band
    PopulationDataForArea:
      type: object
      description: Population data for a requested area
      required:
        - areaCode
        - populationData
      properties:
        areaCode:
          type: string
          example: A1426
          description: The unique area code that the population data are for.
        areaName:
          type: string
          example: England
          description: The name of the area code that the population data are for.
        year:
          type: integer
          example: 2023
          description: The year which the population data are for.
        populationData:
          type: array
          items:
            $ref: "#/components/schemas/PopulationDataPoint"
          description: The population data point for the area
    PopulationDataForArea_ASIS:
      type: object
      description: Population data for a requested area using format from AS-IS api e.g. "https://fingertips.phe.org.uk/api/quinary_population?area_code=E92000001&area_type_id=15"
      required:
        - Code
        - Values
        - PopulationTotals
        - Labels
        - IndicatorName
        - IndicatorId
        - Period
        - ChildAreaCount
      properties:
        Code:
          type: string
          example: England
          description: The name of the area code that the population data are for.
        Values:
          type: object
          description: object of arrays of values for each sexCode
        PopulationTotals:
          type: object
          description: object of arrays of populaton totals for each sexCode
        Labels:
          type: array
          description: array of labels for age bands
          example:
            - "0-4"
            - "5-9"
            - "10-14"
            - "15-19"
            - "20-24"
            - "25-29"
            - "30-34"
            - "35-39"
            - "40-44"
            - "45-49"
            - "50-54"
            - "55-59"
            - "60-64"
            - "65-69"
            - "70-74"
            - "75-79"
            - "80-84"
            - "85-89"
            - "90+"
          enum:
            - "0-4"
            - "5-9"
            - "10-14"
            - "15-19"
            - "20-24"
            - "25-29"
            - "30-34"
            - "35-39"
            - "40-44"
            - "45-49"
            - "50-54"
            - "55-59"
            - "60-64"
            - "65-69"
            - "70-74"
            - "75-79"
            - "80-84"
            - "85-89"
            - "90+"
        IndicatorName:
          type: string
          description: name of indicator
          example: Resident population
          enum:
            - Resident population
            - GP registered population by sex and quinary age band
        IndicatorId:
          type: integer
          description: indicator ID
          example: 92708
          enum:
            - 92708
            - 337
        Period:
          type: string
          description: time period for data
          example: 2023
        ChildAreaCount:
          type: integer
          example: 1
  parameters:
    years:
      in: query
      name: years
      description: A list of years, up to 10 years can be requested
      style: form
      schema:
        type: array
        items:
          type: integer
        maxItems: 10
      example:
        - 2023
    area_codes:
      in: query
      name: area_codes
      description: A list of area codes, up to 10 area codes can be requested
      style: form
      schema:
        type: array
        items:
          type: string
        maxItems: 10
      example:
        - G82109
        - A1426
        - U64053
        - U68213
    indicator_id:
      in: path
      name: indicator_id
      style: simple
      schema:
        type: integer
        example: 1234
        minimum: 1
      explode: false
      required: true
      description: The unique identifier of the indicator
    indicator_ids:
      in: query
      name: indicator_ids
      description: A list of indicator_ids, up to 10 can be requested
      style: form
      schema:
        type: array
        items:
          type: integer
          example: 1234
        maxItems: 10
  responses:
    NotFound:
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
      description:
        The server cannot find the requested resource. The endpoint may be
        invalid or the resource may no longer exist.
    BadRequest:
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
      description:
        The server could not understand the request due to invalid syntax.
        The client should modify the request and try again.
    InternalServerErrror:
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
      description:
        The server encountered an unexpected condition that prevented it
        from fulfilling the request. Report the issue to the support team if it
        persists.
